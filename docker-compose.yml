# Standalone deployment of the Meritlab classification service.
# This is intentionally SEPARATE from Meritlab's docker-compose: the service is
# deployed and scaled on its own. Copy .env.example to .env and fill in the secrets.
services:
  classification-service:
    build: .
    ports:
      - "8100:8100"
    env_file:
      - .env
    restart: unless-stopped
